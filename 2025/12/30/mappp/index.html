roid.view.MotionEvent    <span class="comment">// 导入触摸事件类</span></span><br><span class="line"><span class="keyword">import</span> android.widget.Toast        <span class="comment">// 导入Toast类，用于显示提示信息</span></span><br><span class="line"><span class="keyword">import</span> androidx.appcompat.app.AppCompatActivity <span class="comment">// 导入AppCompatActivity基类</span></span><br><span class="line"><span class="keyword">import</span> com.example.newlearn.R                    <span class="comment">// 导入资源文件</span></span><br><span class="line"><span class="keyword">import</span> com.github.chrisbanes.photoview.PhotoView <span class="comment">// 导入PhotoView库</span></span><br><span class="line"></span><br><span class="line"><span class="keyword">class</span> <span class="title class_">GameMapActivity</span> : <span class="type">AppCompatActivity</span>() &#123;</span><br><span class="line"></span><br><span class="line">    <span class="keyword">private</span> <span class="keyword">lateinit</span> <span class="keyword">var</span> photoView: PhotoView <span class="comment">// 声明PhotoView实例，用于显示地图</span></span><br><span class="line">    <span class="keyword">private</span> <span class="keyword">val</span> matrix = Matrix()                <span class="comment">// 声明矩阵实例，用于坐标变换计算</span></span><br><span class="line">    <span class="keyword">private</span> <span class="keyword">lateinit</span> <span class="keyword">var</span> gestureDetector: GestureDetector <span class="comment">// 声明手势检测器实例</span></span><br><span class="line"></span><br><span class="line">    <span class="keyword">override</span> <span class="function"><span class="keyword">fun</span> <span class="title">onCreate</span><span class="params">(savedInstanceState: <span class="type">Bundle</span>?)</span></span> &#123;  <span class="comment">// 重写onCreate方法，Activity创建时调用</span></span><br><span class="line">        <span class="keyword">super</span>.onCreate(savedInstanceState)               <span class="comment">// 调用父类onCreate方法</span></span><br><span class="line">        setContentView(R.layout.activity_game_map)     <span class="comment">// 设置布局文件</span></span><br><span class="line"></span><br><span class="line">        photoView = findViewById(R.id.game_map_view)   <span class="comment">// 通过ID查找PhotoView组件</span></span><br><span class="line"></span><br><span class="line">        photoView.setMaximumScale(<span class="number">5.0f</span>)  <span class="comment">// 设置最大缩放倍数为5倍</span></span><br><span class="line">        photoView.setMediumScale(<span class="number">2.5f</span>)   <span class="comment">// 设置中等缩放倍数为2.5倍（双击目标缩放）</span></span><br><span class="line"></span><br><span class="line"></span><br><span class="line">        <span class="comment">// 设置地图图片</span></span><br><span class="line">        photoView.setImageResource(R.drawable.map1) <span class="comment">// 设置地图图片资源</span></span><br><span class="line"></span><br><span class="line">        <span class="comment">// 创建手势检测器</span></span><br><span class="line">        gestureDetector = GestureDetector(<span class="keyword">this</span>, <span class="keyword">object</span> : GestureDetector.SimpleOnGestureListener() &#123;</span><br><span class="line">            <span class="keyword">override</span> <span class="function"><span class="keyword">fun</span> <span class="title">onSingleTapConfirmed</span><span class="params">(e: <span class="type">MotionEvent</span>)</span></span>: <span class="built_in">Boolean</span>&#123;<span class="comment">// 处理确认的单击事件</span></span><br><span class="line">                handleMapClick(photoView, e)                          <span class="comment">// 调用地图点击处理方法</span></span><br><span class="line">                <span class="keyword">return</span> <span class="literal">true</span></span><br><span class="line">            &#125;</span><br><span class="line"></span><br><span class="line">            <span class="keyword">override</span> <span class="function"><span class="keyword">fun</span> <span class="title">onDoubleTap</span><span class="params">(e: <span class="type">MotionEvent</span>)</span></span>: <span class="built_in">Boolean</span> &#123;        <span class="comment">// 处理双击事件</span></span><br><span class="line">                <span class="comment">// 双击事件</span></span><br><span class="line">                <span class="keyword">return</span> <span class="literal">true</span></span><br><span class="line">            &#125;</span><br><span class="line">        &#125;)</span><br><span class="line">        <span class="comment">// 设置缩放监听器</span></span><br><span class="line">        photoView.setOnMatrixChangeListener &#123; rectF -&gt;</span><br><span class="line">            <span class="comment">// 处理缩放变化 - 当前未实现具体逻辑</span></span><br><span class="line">        &#125;</span><br><span class="line"></span><br><span class="line">        <span class="comment">// 设置单击监听器</span></span><br><span class="line">        photoView.setOnViewTapListener &#123; view, x, y -&gt;    <span class="comment">// 设置视图点击监听器</span></span><br><span class="line">            <span class="comment">// 创建一个简单的MotionEvent来模拟点击位置</span></span><br><span class="line">            <span class="keyword">val</span> mockEvent = MotionEvent.obtain(            <span class="comment">// 获取MotionEvent实例</span></span><br><span class="line">                System.currentTimeMillis(),                <span class="comment">// 设置事件开始时间</span></span><br><span class="line">                System.currentTimeMillis(),                <span class="comment">// 设置事件发生时间</span></span><br><span class="line">                MotionEvent.ACTION_UP,                     <span class="comment">// 设置动作为抬起</span></span><br><span class="line">                x,                                         <span class="comment">// 设置X坐标</span></span><br><span class="line">                y,                                         <span class="comment">// 设置Y坐标</span></span><br><span class="line">                <span class="number">0</span>                                 <span class="comment">// 设置设备ID</span></span><br><span class="line">            )</span><br><span class="line">            handleMapClick(photoView, mockEvent)          <span class="comment">// 调用地图点击处理方法</span></span><br><span class="line">            mockEvent.recycle()                           <span class="comment">// 回收MotionEvent对象</span></span><br><span class="line">        &#125;</span><br><span class="line"></span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    <span class="keyword">private</span> <span class="function"><span class="keyword">fun</span> <span class="title">handleMapClick</span><span class="params">(photoView: <span class="type">PhotoView</span>, event: <span class="type">MotionEvent</span>)</span></span>&#123;<span class="comment">// 处理地图点击方法</span></span><br><span class="line">        <span class="comment">// 获取当前变换矩阵</span></span><br><span class="line">        <span class="keyword">val</span> currentMatrix = FloatArray(<span class="number">9</span>)                            <span class="comment">// 创建长度为9的浮点数组</span></span><br><span class="line">        photoView.getSuppMatrix(matrix)                             <span class="comment">// 获取当前支持的变换矩阵</span></span><br><span class="line">        matrix.getValues(currentMatrix)                                <span class="comment">// 将矩阵值复制到数组</span></span><br><span class="line"></span><br><span class="line">        <span class="comment">// 计算实际地图坐标</span></span><br><span class="line">        <span class="keyword">val</span> x = event.x                                                 <span class="comment">// 获取触摸事件X坐标</span></span><br><span class="line">        <span class="keyword">val</span> y = event.y                                                 <span class="comment">// 获取触摸事件Y坐标</span></span><br><span class="line"></span><br><span class="line">        <span class="comment">// 考虑缩放和平移的坐标转换</span></span><br><span class="line">        <span class="keyword">val</span> scale = currentMatrix[Matrix.MSCALE_X]                         <span class="comment">// 获取X轴缩放值</span></span><br><span class="line">        <span class="keyword">val</span> transX = currentMatrix[Matrix.MTRANS_X]                        <span class="comment">// 获取X轴平移值</span></span><br><span class="line">        <span class="keyword">val</span> transY = currentMatrix[Matrix.MTRANS_Y]                        <span class="comment">// 获取Y轴平移值</span></span><br><span class="line"></span><br><span class="line">        <span class="keyword">val</span> actualX = (x - transX) / scale                                 <span class="comment">// 计算实际X坐标</span></span><br><span class="line">        <span class="keyword">val</span> actualY = (y - transY) / scale                                 <span class="comment">// 计算实际Y坐标</span></span><br><span class="line"></span><br><span class="line">        <span class="comment">// 处理点击位置的逻辑</span></span><br><span class="line">        processMapClick(actualX, actualY)                                <span class="comment">// 调用位置处理方法</span></span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    <span class="keyword">private</span> <span class="function"><span class="keyword">fun</span> <span class="title">processMapClick</span><span class="params">(x: <span class="type">Float</span>, y: <span class="type">Float</span>)</span></span> &#123;                 <span class="comment">// 处理点击位置逻辑方法</span></span><br><span class="line">        <span class="comment">// 在这里实现点击地图后的逻辑</span></span><br><span class="line">        <span class="comment">// 例如：显示点击位置信息、触发游戏事件等</span></span><br><span class="line">        Toast.makeText(<span class="keyword">this</span>, <span class="string">&quot;点击位置: X=<span class="variable">$x</span>, Y=<span class="variable">$y</span>&quot;</span>, Toast.LENGTH_SHORT).show() <span class="comment">// 显示点击位置的Toast提示</span></span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
